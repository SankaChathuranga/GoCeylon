services:
  db:
    image: postgres:16-alpine
    container_name: goceylon-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-go_ceylon}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-go_ceylon}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./goceylon-backend
    container_name: goceylon-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-go_ceylon}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-GoCeylonSecretKeyForJWTTokenGeneration2024ThisMustBeLongEnoughForHS512Algorithm}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      GOCEYLON_CORS_ALLOWED_ORIGINS: ${GOCEYLON_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./goceylon-frontend
      args:
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-}
    container_name: goceylon-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  postgres_data:
