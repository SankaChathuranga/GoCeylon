server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: goceylon-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/go_ceylon}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:GoCeylonSecretKeyForJWTTokenGeneration2024ThisMustBeLongEnoughForHS512Algorithm}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in milliseconds

# Platform Configuration
goceylon:
  commission-rate: 0.10  # 10% platform commission
  cors:
    allowed-origins: ${GOCEYLON_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
